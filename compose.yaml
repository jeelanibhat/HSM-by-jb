# Local dev stack. Works with `podman compose` and `docker compose` alike.
#   pnpm db:up      -> start
#   pnpm db:reset   -> wipe volumes and restart
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: hotelos-postgres
    environment:
      POSTGRES_USER: hotelos
      POSTGRES_PASSWORD: hotelos
      POSTGRES_DB: hotelos
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Extensions the schema depends on (uuidv7 ids, gist exclusion constraint)
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hotelos -d hotelos']
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    # BSD-licensed Redis drop-in — same wire protocol, same clients (ioredis).
    image: docker.io/valkey/valkey:8-alpine
    container_name: hotelos-valkey
    ports:
      - '6379:6379'
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  valkeydata:
