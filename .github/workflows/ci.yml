name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR makes the in-flight run obsolete — don't burn free minutes on it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.4'

jobs:
  # TDD §8.4: lint → typecheck → unit → integration → build → e2e
  # Static gates run as one job: they share an install and all fail fast.
  static:
    name: lint · typecheck · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  integration:
    name: integration (postgres + valkey)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotelos
          POSTGRES_PASSWORD: hotelos
          POSTGRES_DB: hotelos
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hotelos -d hotelos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      valkey:
        image: valkey/valkey:8-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Runtime connects as the UNPRIVILEGED role. If CI ran the app as `hotelos`
      # (a superuser), every RLS test would pass vacuously — superusers bypass RLS
      # entirely. That is exactly the bug these tests exist to catch.
      DATABASE_URL: postgresql://hotelos_app:hotelos_app@localhost:5432/hotelos
      DATABASE_MIGRATION_URL: postgresql://hotelos:hotelos@localhost:5432/hotelos
      VALKEY_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      # Throwaway CI keys, deliberately in the clear: they encrypt nothing but seed
      # data in a database that is destroyed with the runner. A GitHub secret here
      # would imply these protect something. They must never be a real property's keys.
      PII_ENCRYPTION_KEY: 7hAT+Tbpl36EvFspU9rnw64I9zdyYZytaucttuSeRwM=
      PII_HASH_KEY: altIKB3RxkWOeTiNleZ+BM5Bsbr1e0IcHIceKBKaf0w=

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GitHub service containers don't run docker-entrypoint-initdb.d, so the
      # init scripts that dev gets for free must be applied by hand here.
      #
      #   01: btree_gist — the no_double_booking EXCLUDE constraint needs it.
      #   02: hotelos_app — the unprivileged runtime role. Without it the app would
      #       connect as a superuser and RLS would silently not apply.
      - name: Bootstrap Postgres (extensions + app role)
        env:
          PGPASSWORD: hotelos
        run: |
          psql -h localhost -U hotelos -d hotelos -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/01-extensions.sql
          psql -h localhost -U hotelos -d hotelos -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/02-app-role.sql

      - name: Migrate
        run: pnpm --filter @hotelos/api db:migrate

      - name: Seed
        run: pnpm --filter @hotelos/api db:seed

      - name: Integration tests
        run: pnpm test:integration

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [static]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql

  # E2E runs against a PRODUCTION build with a seeded DB (TDD §8.3) — the same
  # artefact that would ship. A suite that only ever passes against `next dev` is
  # not a regression net.
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [build, integration]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotelos
          POSTGRES_PASSWORD: hotelos
          POSTGRES_DB: hotelos
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hotelos -d hotelos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      valkey:
        image: valkey/valkey:8-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # As in the integration job: the app connects UNPRIVILEGED, or RLS is inert.
      DATABASE_URL: postgresql://hotelos_app:hotelos_app@localhost:5432/hotelos
      DATABASE_MIGRATION_URL: postgresql://hotelos:hotelos@localhost:5432/hotelos
      VALKEY_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      # Throwaway CI keys, deliberately in the clear: they encrypt nothing but seed
      # data in a database that is destroyed with the runner. A GitHub secret here
      # would imply these protect something. They must never be a real property's keys.
      PII_ENCRYPTION_KEY: 7hAT+Tbpl36EvFspU9rnw64I9zdyYZytaucttuSeRwM=
      PII_HASH_KEY: altIKB3RxkWOeTiNleZ+BM5Bsbr1e0IcHIceKBKaf0w=
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
      CI: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bootstrap Postgres (extensions + app role)
        env:
          PGPASSWORD: hotelos
        run: |
          psql -h localhost -U hotelos -d hotelos -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/01-extensions.sql
          psql -h localhost -U hotelos -d hotelos -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/02-app-role.sql

      - name: Migrate + seed
        run: |
          pnpm --filter @hotelos/api db:migrate
          pnpm --filter @hotelos/api db:seed

      - name: Build (the artefact under test)
        run: pnpm build

      - name: Install Chromium
        run: pnpm --filter @hotelos/e2e install:browsers

      # playwright.config.ts starts both apps itself (`webServer`) and waits on
      # /healthz — no sleep, no racing the boot.
      - name: E2E
        run: pnpm e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
